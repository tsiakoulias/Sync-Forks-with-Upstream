name: Sync forks with upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: sync-forks-with-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - fork_repo: Alien-Swarm-Reactive-Drop
            upstream_repo: ReactiveDrop/reactivedrop_public_src
          - fork_repo: Bulk-Crap-Uninstaller
            upstream_repo: Klocman/Bulk-Crap-Uninstaller
          - fork_repo: certbot
            upstream_repo: certbot/certbot
          - fork_repo: ch1ckenscoop-svn
            upstream_repo: Ch1ckenscoop/svn
          - fork_repo: claude-code-showcase
            upstream_repo: ChrisWiles/claude-code-showcase
          - fork_repo: greenshot
            upstream_repo: greenshot/greenshot
          - fork_repo: keepassxc
            upstream_repo: keepassxreboot/keepassxc
          - fork_repo: Sharedown
            upstream_repo: kylon/Sharedown
          - fork_repo: wikijs
            upstream_repo: requarks/wiki
          - fork_repo: xpipe
            upstream_repo: xpipe-io/xpipe
    env:
      FORK_OWNER: tsiakoulias
    steps:
      - name: Validate token
        env:
          FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FORK_SYNC_TOKEN:-}" ]; then
            echo "::error::Missing FORK_SYNC_TOKEN secret."
            exit 1
          fi

      - name: Mirror upstream to fork default branch
        env:
          FORK_REPO: ${{ matrix.repo.fork_repo }}
          UPSTREAM_REPO: ${{ matrix.repo.upstream_repo }}
          FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          git clone --no-tags --filter=blob:none "https://x-access-token:${FORK_SYNC_TOKEN}@github.com/${FORK_OWNER}/${FORK_REPO}.git" fork
          cd fork

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"

          fork_default="$(git ls-remote --symref origin HEAD | awk '/^ref:/ {print $2}' | sed 's#refs/heads/##')"
          upstream_default="$(git ls-remote --symref upstream HEAD | awk '/^ref:/ {print $2}' | sed 's#refs/heads/##')"

          if [ -z "$fork_default" ] || [ -z "$upstream_default" ]; then
            echo "::error::Could not resolve default branches for ${FORK_REPO} or ${UPSTREAM_REPO}."
            exit 1
          fi

          git fetch upstream "$upstream_default" --prune
          git push --force origin "refs/remotes/upstream/$upstream_default:refs/heads/$fork_default"

          echo "Mirrored ${UPSTREAM_REPO}:${upstream_default} -> ${FORK_OWNER}/${FORK_REPO}:${fork_default}"
